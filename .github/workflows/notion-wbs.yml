name: Sync to Notion WBS

on:
  push:
    branches: ['**']
  pull_request:
    types: [opened, closed]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install @notionhq/client
      - name: Sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          REF_NAME: ${{ github.ref_name }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          COMMITS_JSON: ${{ toJson(github.event.commits) }}
          COMPARE_URL: ${{ github.event.compare }}
          HEAD_COMMIT_URL: ${{ github.event.head_commit.url }}
        run: node .github/scripts/sync-notion.js

      - name: Notify Discord (Push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -1)
          AUTHOR='${{ github.event.head_commit.author.name }}'
          BRANCH='${{ github.ref_name }}'
          REPO='${{ github.repository }}'
          URL='${{ github.event.head_commit.url }}'
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"📦 새 커밋 - $REPO\",
                \"description\": \"\`\`\`$COMMIT_MSG\`\`\`\",
                \"color\": 3447003,
                \"fields\": [
                  {\"name\": \"브랜치\", \"value\": \"\`$BRANCH\`\", \"inline\": true},
                  {\"name\": \"작성자\", \"value\": \"$AUTHOR\", \"inline\": true}
                ],
                \"url\": \"$URL\"
              }]
            }"

      - name: Notify Discord (Pull Request)
        if: github.event_name == 'pull_request'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          ACTION='${{ github.event.action }}'
          PR_TITLE='${{ github.event.pull_request.title }}'
          PR_URL='${{ github.event.pull_request.html_url }}'
          AUTHOR='${{ github.event.pull_request.user.login }}'
          FROM='${{ github.head_ref }}'
          TO='${{ github.base_ref }}'
          MERGED='${{ github.event.pull_request.merged }}'

          if [ "$ACTION" = "opened" ]; then
            TITLE="🔀 PR 오픈"
            COLOR=5025616
          elif [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
            TITLE="✅ PR 머지됨"
            COLOR=5763719
          else
            TITLE="❌ PR 닫힘"
            COLOR=15548997
          fi

          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"description\": \"[$PR_TITLE]($PR_URL)\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"작성자\", \"value\": \"$AUTHOR\", \"inline\": true},
                  {\"name\": \"$FROM → $TO\", \"value\": \" \", \"inline\": true}
                ]
              }]
            }"
